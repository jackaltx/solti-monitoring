---
# Test playbook for matrix_event module
#
# This playbook tests the jackaltx.solti_matrix_mgr.matrix_event module
# by posting test events to the verification room.
#
# Usage:
#   cd /home/lavender/sandbox/ansible/jackaltx/solti-monitoring
#   ansible-playbook tests/test-matrix-event.yml
#
# Requirements:
#   - Matrix verification room must exist (#solti-verify:jackaltx.com)
#   - Bot token must exist at mylab/data/matrix-logger-token.txt

- name: Test Matrix Event Module
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    matrix_homeserver_url: "https://matrix-web.jackaltx.com"
    matrix_room_id: "#solti-verify:jackaltx.com"
    token_file: "{{ playbook_dir }}/../../mylab/data/matrix-logger-token.txt"
    room_file: "{{ playbook_dir }}/../../mylab/data/matrix-verify-room.txt"

  tasks:
    - name: Check if bot token exists
      ansible.builtin.stat:
        path: "{{ token_file }}"
      register: token_stat

    - name: Fail if token not found
      ansible.builtin.fail:
        msg: |
          Bot token not found at {{ token_file }}
          Run: cd ../mylab && ./bin/get-matrix-token.sh
      when: not token_stat.stat.exists

    - name: Check if room file exists
      ansible.builtin.stat:
        path: "{{ room_file }}"
      register: room_stat

    - name: Fail if room not created
      ansible.builtin.fail:
        msg: |
          Room file not found at {{ room_file }}
          Run: cd ../mylab && ansible-playbook playbooks/create-matrix-verify-room.yml
      when: not room_stat.stat.exists

    - name: Read bot access token
      ansible.builtin.slurp:
        src: "{{ token_file }}"
      register: token_content

    - name: Set access token fact
      ansible.builtin.set_fact:
        matrix_access_token: "{{ token_content['content'] | b64decode | trim }}"

    - name: Test 1 - Post simple test event
      jackaltx.solti_matrix_mgr.matrix_event:
        homeserver_url: "{{ matrix_homeserver_url }}"
        access_token: "{{ matrix_access_token }}"
        room_id: "{{ matrix_room_id }}"
        event_type: "com.solti.test"
        event_content:
          message: "Test event from matrix_event module"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          test_number: 1
      register: test1_result

    - name: Display test 1 result
      ansible.builtin.debug:
        msg:
          - "Test 1 completed successfully"
          - "  Event ID: {{ test1_result.event_id }}"
          - "  Room ID: {{ test1_result.room_id }}"
          - "  Transaction ID: {{ test1_result.transaction_id }}"

    - name: Test 2 - Post verification failure event
      jackaltx.solti_matrix_mgr.matrix_event:
        homeserver_url: "{{ matrix_homeserver_url }}"
        access_token: "{{ matrix_access_token }}"
        room_id: "{{ matrix_room_id }}"
        event_type: "com.solti.verify.fail"
        event_content:
          service: "jackaltx.solti_monitoring.loki"
          host: "monitor11.a0a0.org"
          test: "verify_loki_query_endpoint"
          error: "Connection timeout after 5s (simulated test failure)"
          severity: "error"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          context:
            playbook: "tests/test-matrix-event.yml"
            distribution: "{{ ansible_distribution }}_{{ ansible_distribution_version }}"
            test_number: 2
      register: test2_result

    - name: Display test 2 result
      ansible.builtin.debug:
        msg:
          - "Test 2 completed successfully"
          - "  Event ID: {{ test2_result.event_id }}"
          - "  Event Type: {{ test2_result.event_type }}"

    - name: Test 3 - Post verification success event
      jackaltx.solti_matrix_mgr.matrix_event:
        homeserver_url: "{{ matrix_homeserver_url }}"
        access_token: "{{ matrix_access_token }}"
        room_id: "{{ matrix_room_id }}"
        event_type: "com.solti.verify.pass"
        event_content:
          status: "PASSED"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          services:
            loki: true
            influxdb: true
            alloy: true
          context:
            collection: "solti-monitoring"
            test_number: 3
      register: test3_result

    - name: Display test 3 result
      ansible.builtin.debug:
        msg:
          - "Test 3 completed successfully"
          - "  Event ID: {{ test3_result.event_id }}"
          - "  Event Type: {{ test3_result.event_type }}"

    - name: Test 4 - Test with explicit transaction ID
      jackaltx.solti_matrix_mgr.matrix_event:
        homeserver_url: "{{ matrix_homeserver_url }}"
        access_token: "{{ matrix_access_token }}"
        room_id: "{{ matrix_room_id }}"
        event_type: "com.solti.test"
        event_content:
          message: "Test with explicit transaction ID"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          test_number: 4
        transaction_id: "test-txn-{{ ansible_date_time.epoch }}"
      register: test4_result

    - name: Display test 4 result
      ansible.builtin.debug:
        msg:
          - "Test 4 completed successfully"
          - "  Transaction ID: {{ test4_result.transaction_id }}"

    - name: Final summary
      ansible.builtin.debug:
        msg:
          - "✓ All tests completed successfully!"
          - ""
          - "Summary:"
          - "  - Posted 4 test events to Matrix room"
          - "  - Room: {{ matrix_room_id }}"
          - "  - Homeserver: {{ matrix_homeserver_url }}"
          - ""
          - "Next steps:"
          - "  1. Open Element at https://matrix.jackaltx.com"
          - "  2. Check room #solti-verify:jackaltx.com for test events"
          - "  3. Verify events display correctly"
