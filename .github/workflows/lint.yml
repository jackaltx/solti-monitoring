---
name: Lint and Syntax Check

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint .

  markdown-lint:
    name: Markdown Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: pip install ansible-lint ansible-core

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.general
          ansible-galaxy collection install containers.podman
          ansible-galaxy collection install containers.proxmox
          ansible-galaxy collection install ansible.posix

      # - name: Run ansible-lint
      #   run: ansible-lint

      - name: Run ansible-lint
        run: ansible-lint
        env:
          # 1. Point to where galaxy installed the collections
          ANSIBLE_COLLECTIONS_PATH: /home/runner/.ansible/collections
          # 2. Tell the linter to stop trying to auto-install (prevents "offline mode")
          ANSIBLE_LINT_OFFLINE: "1"

  syntax-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible-core

      # - name: Syntax check all playbooks
      #   run: |
      #     for playbook in $(find ./playbooks -name "*.yml" -o -name "*.yaml" 2>/dev/null || true); do
      #       if [ -f "$playbook" ]; then
      #         echo "Checking $playbook"
      #         ansible-playbook --syntax-check "$playbook" || exit 1
      #       fi
      #     done

      - name: Syntax check all playbooks
        run: |
          export ANSIBLE_ROLES_PATH=./roles:./playbooks/roles
          for playbook in $(find ./playbooks -name "*.yml" -o -name "*.yaml" 2>/dev/null || true); do
            if [ -f "$playbook" ]; then
              echo "Checking $playbook"
              ansible-playbook --syntax-check "$playbook" || exit 1
            fi
          done
