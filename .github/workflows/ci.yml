---
name: CI

#  Developer notes:
#   Phasing out github wiki, move to mattermost?
#   Builds in main branch are flakey.

on:
  push:
    branches: [main, master] # Only trigger when code is MERGED into main
    paths:
      - "roles/**"
      - "molecule/**"
      - ".github/**"
  pull_request:
    branches: [main, master] # Trigger when a PR is opened/updated targeting main
    paths:
      - "roles/**"
      - "molecule/**"
      - ".github/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run tests on"
        required: true
        default: "main"

env:
  DEBUG_MODE: save
  MOLECULE_NO_LOG: false
  PY_COLORS: 1
  ANSIBLE_FORCE_COLOR: 1

jobs:
  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read # Required to pull from GHCR
    strategy:
      matrix:
        platform: ["uut-ct0", "uut-ct1"] # , 'uut-ct2']
      fail-fast: false
      # max-parallel: 1
    env:
      MOLECULE_PLATFORM_NAME: ${{ matrix.platform }}
      ANSIBLE_LOCALHOST_WARNING: false
      MOLECULE_VERIFY_RETRY: 3
      MOLECULE_SERIAL: 1

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out code
        uses: actions/checkout@v4

      # - name: Check out wiki repository
      #   uses: actions/checkout@v4
      #   with:
      #     repository: ${{ github.repository }}.wiki
      #     path: main/.wiki
      #     token: ${{ secrets.WIKI_TOKEN }}

      # ------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            ansible-core==2.18.1 \
            molecule==24.12.0 \
            molecule-plugins==23.5.3 \
            ansible-lint==24.12.1 \
            yamllint==1.35.1 \
            jmespath

      # ------------------------------------------------------
      # ------------------------------------------------------
      # ------------------------------------------------------
      # ------------------------------------------------------
      - name: Docker Info
        run: |
          docker version
          docker info

      # ------------------------------------------------------
      # ------------------------------------------------------
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Pull container images
        run: |
          case ${{ matrix.platform }} in
            uut-ct0)
              docker pull ghcr.io/jackaltx/testing-containers/debian-ssh:12
              ;;
            uut-ct1)
              docker pull ghcr.io/jackaltx/testing-containers/rocky-ssh:9
              ;;
            uut-ct2)
              docker pull ghcr.io/jackaltx/testing-containers/ubuntu-ssh:24
              ;;
          esac

      # ------------------------------------------------------
      # ------------------------------------------------------
      # ------------------------------------------------------
      # ------------------------------------------------------
      - name: Create ansible verify_output and log directories
        run: |
          mkdir -p log
          mkdir -p verify_output
          chmod -R 755 verify_output

      # - name: Install Ansible collections
      #   run: ansible-galaxy collection install -r requirements.yml community.general

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml -p ./collections

      # ------------------------------------------------------
      # ------------------------------------------------------
      # ------------------------------------------------------
      # ------------------------------------------------------
      - name: Run Molecule tests
        run: molecule test -s github
        continue-on-error: ${{ env.DEBUG_MODE != 'none' }}
        env:
          IN_GITHUB_CI: true
          LOG_DURATION: "5m"
          GITHUB_WORKSPACE: ${{ github.workspace }}/main
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      # ------------------------------------------------------
      # ------------------------------------------------------
      # ------------------------------------------------------
      # ------------------------------------------------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-test-results
          path: verify_output
          retention-days: 5
          if-no-files-found: warn

