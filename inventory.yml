---
# .........................................
# This is a sample inventory. I set the LAB_TLD to a valid domain and manage it.
# For fancy, see solti-container on how to control remote LINOE dns.
#
all:
  vars:
    domain: "{{ lookup('env', 'LAB_TLD') | default('example.com', true) }}"
    secure_logging: "{{ cluster_secure_log | bool | default(true) }}"
    mylab_nolog: false

    # Customize to your configuration user
    # This is a required variable, to allow different remote users (with a ssh key)
    ansible_user: da_configurator_account

    # Customize this (or omit) as desired
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    # SMELL: this is a wrong level
    influx_org: example
    influx_default_bucket: telegraf

  children:
    # ................................................
    # This is a convenience for testing.  I put everyhing under mylab
    # Then create subsets (metric_collectors, clients, and wazuh agent experiments)
    mylab:
      # .........................................
      hosts:
        # I was manual two distro's on alocal proxmox server
        monitor11:
          ansible_host: "monitor11.{{ domain }}"

        # linode vm for testing
        linode_test:
          ansible_host: "linode.example.com"

      # .........................................
      # mylab vars
      vars:
        telegraf_outputs: []

      children:
        # .....................................
        metric_collectors:
          hosts:
            monitor11:
              # see group_vars/all/telegraf2influx-configs.yml
              telegraf_outputs: [localhost, sample]

          # ........................................
          # metric_collectors only vars
          vars:
            influxdb_level: warn

        # .....................................
        # used to install common packages
        clients:
          hosts:
            monitor3:
              alloy_loki_endpoints:
                - label: localhost
                  endpoint: "127.0.0.1"
            monitor4:
              alloy_loki_endpoints:
                - label: localhost
                  endpoint: "127.0.0.1"
