---
# Used by the container diagnostics
# I envision this data being assembles from the parts.
# ..............................................................
# Version 2
monitoring_capabilities:
  logs:
    roles:
      - loki
      - alloy
    required_packages:
      Debian: &debian_logs_deps
        - gpg
        - ca-certificates
        - lsof
      Ubuntu: *debian_logs_deps # Reuse Debian dependencies
      RedHat: &redhat_logs_deps
        - gpg
        - ca-certificates
        - lsof
        - procps-ng
      Rocky: *redhat_logs_deps # Reuse RedHat dependencies
    verify_role_tasks:
      loki:
        - verify.yml
        - verify1.yml
      alloy:
        - verify.yml
    verify_tasks:
      - verify-logs.yml
    service_names:
      - loki
      - alloy
    service_ports:
      - 3100
      - 12345

  metrics:
    roles:
      - influxdb
      - influxdb3
      - telegraf
    required_packages:
      Debian: &debian_metrics_deps
        - gpg
        - ca-certificates
        - lsof
      Ubuntu: *debian_metrics_deps
      RedHat: &redhat_metrics_deps
        - gpg
        - ca-certificates
        - lsof
        - procps-ng
      Rocky: *redhat_metrics_deps
    verify_role_tasks:
      influxdb:
        - verify.yml
      influxdb3:
        - verify.yml
        - verify-collecting.yml
    verify_tasks:
      - verify-metrics.yml
      - verify-metrics-v3.yml
    service_names:
      - influxdb
      - influxdb3-core
      - telegraf
    service_ports:
      - 8086
      - 8181
