---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    ignore-errors: true

driver:
  name: podman
  options:
    managed: true
    platform_name: ${MOLECULE_PLATFORM_NAME:-all}

# these are the customized instances build by my test_containers repos.
# These should have a running systemd, prepared ssh, with enough tooling
# to get status.
#
# - I did not create the base image, only added layers.
#
platforms:
  - name: "uut-ct0"
    image: "ghcr.io/jackaltx/testing-containers/debian-ssh:12"
    command: "/sbin/init"
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    ssh_host: "127.0.0.1"
    ssh_port: 2223
    ssh_user: "root"
    connection: ssh

  - name: "uut-ct1"
    image: "ghcr.io/jackaltx/testing-containers/rocky-ssh:9"
    command: "/sbin/init"
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    ssh_host: "127.0.0.1"
    ssh_port: 2222
    ssh_user: "root"
    connection: ssh

  - name: "uut-ct2"
    image: "ghcr.io/jackaltx/testing-containers/ubuntu-ssh:24"
    command: "/sbin/init"
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    ssh_host: "127.0.0.1"
    ssh_port: 2224
    ssh_user: "root"
    connection: ssh

  - name: "uut-ct3"
    image: "ghcr.io/jackaltx/testing-containers/debian-ssh:13"
    command: "/sbin/init"
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    ssh_host: "127.0.0.1"
    ssh_port: 2225
    ssh_user: "root"
    connection: ssh

  - name: "uut-ct4"
    image: "ghcr.io/jackaltx/testing-containers/rocky-ssh:10"
    command: "/sbin/init"
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    ssh_host: "127.0.0.1"
    ssh_port: 2226
    ssh_user: "root"
    connection: ssh

provisioner:
  name: ansible
  env:
    ANSIBLE_FORCE_COLOR: "1"
  log: true
  config_options:
    defaults:
      interpreter_python: auto_silent
      host_key_checking: false
      remote_tmp: /tmp/ansible-tmp
      local_tmp: /tmp/ansible-tmp
      ansible_managed: "Ansible managed"
      # deprecation_warnings: false
  playbooks:
    prepare: "../shared/podman/prepare.yml"
    converge: "../shared/podman/converge.yml"
    verify: "../shared/verify/main.yml"
  inventory:
    host_vars:
      all:
        selected_platform: "${MOLECULE_PLATFORM_NAME}"
    group_vars:
      all:
        # GitHub CI-specific settings (runs as root, no become needed)
        ansible_become: false
        proxmox_vmid: 9100

scenario:
  name: github
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
