---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    ignore-errors: true

driver:
  name: default

platforms:
  - name: "uut-vm"
    template: "MUST_BE_SET" # Intentionally no default - fail if PROXMOX_TEMPLATE unset

provisioner:
  name: ansible
  playbooks:
    verify: "../shared/verify/main.yml"
  log: true
  config_options:
    defaults:
      roles_path: roles
      interpreter_python: auto_silent
      host_key_checking: false
      ansible_managed: "Ansible managed"
      # deprecation_warnings: false
  inventory:
    group_vars:
      all:
        # Proxmox-specific settings
        proxmox_vmid: 9100
        proxmox_template: "{{ lookup('env', 'PROXMOX_TEMPLATE') }}"
        proxmox_vm_name: "uut-vm"
        molecule_ip: "192.168.101.90"
    host_vars:
      uut-vm:
        ansible_host: "192.168.101.90"
        ansible_connection: ssh
        ansible_user: "${USER}"

scenario:
  name: proxmox
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - verify
    - destroy

verifier:
  name: ansible
