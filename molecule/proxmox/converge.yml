---
- name: Converge
  hosts: all
  become: true
  serial: "{{ lookup('env', 'MOLECULE_SERIAL', default='0') }}"

  tasks:
    - name: Set test run timestamp (used across converge and verify)
      set_fact:
        verify_timestamp: "{{ ansible_facts['date_time']['iso8601'] }}"
        cacheable: yes

    # ................................................................
    # note this has to be loaded in each phase playbook!
    #
    - name: Load shared test configuration
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/molecule/shared/vars/test-config.yml"
      delegate_to: localhost
      run_once: true

    - name: Converge Debug information
      debug:
        msg:
          - "Playbook dir: {{ playbook_dir }}"
          - "Roles path: {{ playbook_dir }}/../../roles"
          - "Project_root: {{ project_root }}"
          - "Distribution: {{ ansible_facts['distribution'] }}"
          - "Testing capability: {{ testing_capabilities }}"
          - "Test timestamp: {{ verify_timestamp }}"

    # This is a very useful pattern!!
    # This parses a capabilities dictionary of tasks, roles and distributions
    # The goal to build list of service roles to install, then a list of verifications on that role
    # There are some roles that are integration test of the services.
    # The verification system collects that data and published results into a set of runs to be used by obsidian
    #
    - name: Load capability role definitions
      include_vars:
        file: "{{ project_root }}/molecule/vars/capabilities.yml"
      delegate_to: localhost
      run_once: true

    - name: Debug monitoring_capabilities
      debug:
        var: monitoring_capabilities
        verbosity: 1

    - name: Validate testing capabilities
      assert:
        that:
          - capability in monitoring_capabilities.keys()
        fail_msg: "Invalid capability specified: {{ capability }}"
        success_msg: "Valid capability: {{ capability }}"
      loop: "{{ testing_capabilities }}"
      loop_control:
        loop_var: capability

    - name: Get roles for selected capabilities
      set_fact:
        roles_to_include: >-
          {{
            testing_capabilities |
            map('extract', monitoring_capabilities) |
            map(attribute='roles') |
            flatten |
            list
          }}

    - name: Debug role inclusion
      debug:
        msg:
          - "Testing Capabilities: {{ testing_capabilities }}"
          - "Roles to Include: {{ roles_to_include }}"
        verbosity: 0

    - name: Include roles to be tested
      include_role:
        name: "{{ project_root }}/roles/{{ role_name }}"
      loop: "{{ roles_to_include }}"
      loop_control:
        loop_var: role_name
        label: "Including role: {{ role_name }}"

    - name: Wait for metrics collection to begin
      ansible.builtin.pause:
        seconds: 120
        prompt: "Waiting 2 minutes for Telegraf to collect initial metrics..."
      when: "'metrics' in testing_capabilities"
